<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank | Login</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a2540 0%, #1a4a6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            margin: 20px;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            background: linear-gradient(135deg, #0a2540, #1a4a6f);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #4CAF50;
        }
        
        .login-header h2 {
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .login-header p {
            opacity: 0.8;
            margin-bottom: 0;
        }
        
        .login-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #0a2540;
        }
        
        .form-group input {
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .form-group input:focus {
            border-color: #1a4a6f;
            box-shadow: 0 0 0 3px rgba(26,74,111,0.1);
            outline: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #0a2540, #1a4a6f);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(10,37,64,0.4);
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .register-link a {
            color: #1a4a6f;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            color: #4CAF50;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc3545;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h2>SecureBank</h2>
            <p>AI-Powered Fraud Detection</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Invalid username or password. Please try again.
                </div>
            {% endif %}
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label><i class="fas fa-user me-2"></i>Username</label>
                    <input type="text" name="username" autofocus required id="id_username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock me-2"></i>Password</label>
                    <input type="password" name="password" required id="id_password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i> Login
                </button>
                <input type="hidden" name="next" value="{{ next }}">
            </form>
            <div class="register-link">
                <i class="fas fa-user-plus me-2"></i> Don't have an account? <a href="{% url 'register' %}">Register here</a>
            </div>
        </div>
    </div>
</body>
</html>
